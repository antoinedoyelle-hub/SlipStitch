<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #090f15;
      --bg2: #0f1923;
      --bg3: #162030;
      --border: #1e2d3d;
      --border2: #2a3d50;
      --text: #ccd8d4;
      --text2: #6a8880;
      --text3: #3a5858;
      --gold: #7ab8a8;
      --gold2: #a0d4c4;
      --pb: #080d1a;
      --pbr: #3a5888;
      --pt: #88a8c8;
      --rb: #140608;
      --rbr: #784050;
      --rt: #c89098;
      --gb: #040a08;
      --gbr: #2a7860;
      --gt: #68b898;
      --ab: #100c04;
      --abr: #786838;
      --at: #c0a868;
    }

    body.light {
      --bg: #f7f3ed;
      --bg2: #ffffff;
      --bg3: #ede8df;
      --border: #d8cfc4;
      --border2: #c0b5a8;
      --text: #2c2420;
      --text2: #7a6558;
      --text3: #b0a090;
      --gold: #6a9080;
      --gold2: #88a898;
      --pb: #eef0f4;
      --pbr: #8898b8;
      --pt: #384868;
      --rb: #f8eeee;
      --rbr: #c09898;
      --rt: #684848;
      --gb: #eef4f0;
      --gbr: #88b0a0;
      --gt: #386858;
      --ab: #f8f4ee;
      --abr: #c0a880;
      --at: #685830;
    }

    body.love {
      --bg: #120e18;
      --bg2: #1a1422;
      --bg3: #221c2e;
      --border: #2e2640;
      --border2: #3e3452;
      --text: #e0d8e8;
      --text2: #a090b0;
      --text3: #605870;
      --gold: #b090c0;
      --gold2: #c8a8d8;
      --pb: #1a1428;
      --pbr: #7868a8;
      --pt: #c0b0e0;
      --rb: #180e18;
      --rbr: #905878;
      --rt: #d0a0b8;
      --gb: #18100e;
      --gbr: #907060;
      --gt: #d0b0a0;
      --ab: #181410;
      --abr: #907860;
      --at: #d0b898;
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .screen {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      position: relative;
    }

    .screen.active {
      display: flex;
    }

    #home {
      background: var(--bg);
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-pat {
      position: absolute;
      inset: 0;
      opacity: .05;
      background-image: repeating-linear-gradient(45deg, var(--gold) 0, var(--gold) 1px, transparent 0, transparent 50%);
      background-size: 20px 20px;
    }

    .home-inner {
      text-align: center;
      z-index: 1;
      padding: 2rem;
    }

    .app-logo {
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: .5rem;
    }

    .app-name {
      font-size: 54px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: .5rem;
    }

    .app-sub {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .home-btns {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 260px;
      margin: 0 auto;
    }

    .bp {
      background: var(--gold);
      color: #1a1a2e;
      border: none;
      padding: 18px 32px;
      font-family: 'Georgia', serif;
      font-size: 16px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
    }


    .bs {
      background: var(--bg2);
      color: var(--gold);
      border: 2px solid var(--gold);
      padding: 16px 32px;
      font-family: 'Georgia', serif;
      font-size: 16px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
    }


    .bset {
      background: var(--bg3);
      color: var(--text2);
      border: 2px solid var(--border2);
      padding: 12px 32px;
      font-family: 'Georgia', serif;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .bset:hover {
      filter: brightness(1.15);
    }

    .hdr {
      background: var(--bg2);
      padding: .875rem 1rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
    }

    .bk {
      background: var(--bg3);
      border: 2px solid var(--gold);
      color: var(--gold);
      cursor: pointer;
      padding: 8px 14px;
      border-radius: 8px;
      font-family: 'Georgia', serif;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    button:hover {
      filter: brightness(1.15);
    }

    .htitle {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ha {
      background: var(--gold);
      border: none;
      color: #1a1a2e;
      padding: 8px 14px;
      font-family: 'Georgia', serif;
      font-size: 12px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
    }

    .ha:hover {
      filter: brightness(1.15);
    }

    .sbody {
      flex: 1;
      padding: 1.25rem;
      overflow-y: auto;
      background: var(--bg);
    }

    /* cards */
    .pcard {
      background: var(--bg2);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem;
      cursor: pointer;
      transition: border-color .2s;
      margin-bottom: .75rem;
      position: relative;
    }

    .pcard:hover {
      filter: brightness(1.1);
    }

    .pcard.emode {
      border-color: var(--pbr);
    }

    .pcard.done {
      border-color: var(--gbr);
    }

    .pcard-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .625rem;
    }

    .pname {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }

    .cdot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .pbar {
      background: var(--bg3);
      border-radius: 4px;
      height: 6px;
      margin-bottom: .4rem;
      overflow: hidden;
    }

    .pbfill {
      height: 100%;
      background: var(--gold);
      border-radius: 4px;
      transition: width .4s;
    }

    .pbfill.c {
      background: var(--gbr);
    }

    .pmeta {
      font-size: 11px;
      color: var(--text3);
      display: flex;
      gap: .875rem;
    }

    .pnotes {
      font-size: 11px;
      color: var(--text2);
      margin-top: .4rem;
      font-style: italic;
    }

    .fbadge {
      display: inline-block;
      background: var(--gb);
      border: 1.5px solid var(--gbr);
      color: var(--gt);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
      margin-top: .4rem;
    }

    .ebadge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--pbr);
      color: white;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 10px;
      font-weight: 700;
    }

    /* folder */
    .fcard {
      background: var(--bg2);
      border: 2px solid var(--border);
      border-radius: 10px;
      margin-bottom: .875rem;
      overflow: hidden;
    }

    .fhdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: .875rem 1rem;
      cursor: pointer;
    }

    .fhdr:hover {
      background: var(--bg3);
    }

    .fname {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }

    .fmeta {
      font-size: 11px;
      color: var(--text3);
      margin-right: 6px;
    }

    .fdel {
      background: var(--rb);
      border: 1.5px solid var(--rbr);
      color: var(--rt);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Georgia', serif;
    }

    .flist {
      padding: 0 .875rem .875rem;
    }

    .fempty {
      font-size: 12px;
      color: var(--text3);
      font-style: italic;
      padding: 8px 0;
    }

    /* detail */
    .dcard {
      background: var(--bg2);
      border-radius: 10px;
      padding: 1.1rem;
      border: 2px solid var(--border);
      margin-bottom: 1rem;
    }

    .drow {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .drow:last-child {
      border-bottom: none;
    }

    .dico {
      font-size: 18px;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }

    .dlbl {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .dval {
      font-size: 14px;
      color: var(--text);
      font-weight: 600;
    }

    .dvalnt {
      font-size: 13px;
      color: var(--text2);
      font-style: italic;
      line-height: 1.5;
    }

    .dcdot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border2);
    }

    /* progress */
    .gprog {
      background: var(--bg2);
      border-radius: 10px;
      padding: 1.1rem;
      border: 2px solid var(--border);
      margin-bottom: 1rem;
    }

    .plbl {
      display: flex;
      justify-content: space-between;
      margin-bottom: .625rem;
    }

    .plbl span {
      font-size: 12px;
      color: var(--text2);
    }

    .plbl strong {
      color: var(--gold);
      font-size: 14px;
    }

    .pbar2 {
      background: var(--bg3);
      border-radius: 6px;
      height: 12px;
      overflow: hidden;
    }

    .pbfill2 {
      height: 100%;
      background: var(--gold);
      border-radius: 6px;
      transition: width .4s;
    }

    /* row info */
    .rinfo {
      background: var(--bg2);
      border-radius: 10px;
      padding: 1.1rem;
      border: 2px solid var(--border);
      margin-bottom: 1rem;
    }

    .rbadge {
      display: inline-block;
      background: var(--bg3);
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: .75rem;
      letter-spacing: 1px;
    }

    .sdisp {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: .75rem;
      justify-content: center;
      align-items: center;
    }

    .stok {
      background: var(--bg3);
      border: 2px solid var(--border2);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--text2);
    }

    .stok.cur {
      background: var(--gold);
      border-color: var(--gold2);
      color: #1a1a2e;
      font-weight: 700;
      transform: scale(1.12);
    }

    .stok.dn {
      background: var(--gb);
      border-color: var(--gbr);
      color: var(--gt);
    }

    /* action buttons */
    .agrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
      margin-bottom: 1rem;
    }

    .ab {
      padding: 16px 8px;
      border-radius: 10px;
      font-family: 'Georgia', serif;
      font-size: 14px;
      cursor: pointer;
      border: 2px solid;
      transition: all .2s;
      text-align: center;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .ab:active {
      transform: scale(.97);
    }

    .ab.gold {
      background: var(--ab);
      border-color: var(--abr);
      color: var(--at);
    }


    .ab.out {
      background: var(--bg3);
      border-color: var(--border2);
      color: var(--text2);
    }



    .ab.purp {
      background: var(--pb);
      border-color: var(--pbr);
      color: var(--pt);
    }

    .ab.red {
      background: var(--rb);
      border-color: var(--rbr);
      color: var(--rt);
    }

    .ab.grn {
      background: var(--gb);
      border-color: var(--gbr);
      color: var(--gt);
    }

    .ab.amb {
      background: var(--ab);
      border-color: var(--abr);
      color: var(--at);
    }

    .ab.full {
      grid-column: 1/-1;
    }

    /* form */
    .fg {
      margin-bottom: 1.25rem;
    }

    .fl {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: .5rem;
      display: block;
    }

    .fi {
      width: 100%;
      background: var(--bg2);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'Georgia', serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
    }

    .fi:focus {
      border-color: var(--gold);
    }

    .fta {
      width: 100%;
      background: var(--bg2);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'Georgia', serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      resize: vertical;
      min-height: 70px;
    }

    .fsel {
      width: 100%;
      background: var(--bg2);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'Georgia', serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
    }

    .cpick {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .csw {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
    }

    .csw.sel {
      border-color: white;
      transform: scale(1.2);
    }

    .sdiv {
      border: none;
      border-top: 2px solid var(--border);
      margin: 1.25rem 0;
    }

    /* row builder */
    .rbuild {
      background: var(--bg2);
      border-radius: 10px;
      padding: 1.1rem;
      border: 2px solid var(--border);
      margin-bottom: 1rem;
    }

    .rbhdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .875rem;
    }

    .rbnbadge {
      background: var(--gold);
      color: #1a1a2e;
      font-size: 13px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
    }

    .crdisp {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 44px;
      margin-bottom: .875rem;
      padding: 10px;
      background: var(--bg);
      border-radius: 8px;
      border: 2px solid var(--border);
    }

    .sgrp {
      display: flex;
      align-items: center;
    }

    .sglbl {
      background: var(--bg3);
      border: 2px solid var(--border2);
      border-radius: 20px 0 0 20px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
    }

    .sgcnt {
      background: var(--gold);
      border: 2px solid var(--gold2);
      border-left: none;
      border-radius: 0 20px 20px 0;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 700;
      color: #1a1a2e;
      min-width: 28px;
      text-align: center;
    }

    .sbtns {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: .75rem;
    }

    .sbtn {
      background: var(--bg3);
      border: 2px solid var(--border2);
      border-radius: 8px;
      padding: 10px 4px;
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      cursor: pointer;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .sbtn:hover {
      border-color: var(--gold);
    }

    .sbtn:active {
      transform: scale(.95);
    }

    .sbtn .sym {
      font-size: 16px;
      line-height: 1;
    }

    .sbtn .lbl {
      font-size: 10px;
      color: var(--text3);
    }

    .ract {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: .75rem;
    }

    .rab {
      padding: 12px 8px;
      border-radius: 8px;
      font-family: 'Georgia', serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .rab.amb {
      background: var(--ab);
      border-color: var(--abr);
      color: var(--at);
    }

    .rab.red {
      background: var(--rb);
      border-color: var(--rbr);
      color: var(--rt);
    }

    .rab.grn {
      background: var(--gb);
      border-color: var(--gbr);
      color: var(--gt);
    }

    .rab.purp {
      background: var(--pb);
      border-color: var(--pbr);
      color: var(--pt);
    }

    .rab.full {
      grid-column: 1/-1;
    }

    .rrow {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: .75rem 0 0;
      border-top: 1px solid var(--border);
      margin-top: .75rem;
      flex-wrap: wrap;
    }

    .rlbl {
      font-size: 12px;
      color: var(--text2);
    }

    .rinp {
      background: var(--bg);
      border: 2px solid var(--border2);
      border-radius: 6px;
      padding: 8px 10px;
      width: 60px;
      font-family: 'Georgia', serif;
      font-size: 14px;
      color: var(--text);
      text-align: center;
    }

    .rapbtn {
      background: var(--pb);
      border: 2px solid var(--pbr);
      border-radius: 6px;
      padding: 8px 14px;
      font-family: 'Georgia', serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--pt);
      cursor: pointer;
    }

    .rsums {
      margin-bottom: .875rem;
    }

    .rsum {
      background: var(--bg2);
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 5px;
      border: 2px solid var(--border);
      font-size: 12px;
      color: var(--text2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .rsum:hover {
      border-color: var(--gold);
    }

    .rsum strong {
      color: var(--gold);
    }

    .rsum.sel {
      border-color: var(--gold);
      background: var(--bg3);
    }

    .rtot {
      font-size: 11px;
      color: var(--text3);
      font-style: italic;
      white-space: nowrap;
      margin-left: 8px;
    }

    .fbtn {
      background: var(--gold);
      color: #1a1a2e;
      border: none;
      width: 100%;
      padding: 16px;
      font-family: 'Georgia', serif;
      font-size: 16px;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 2rem;
    }

    /* photo */
    .mphlist {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: .5rem;
    }

    .mphitem {
      position: relative;
    }

    .mphimg {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid var(--border);
      cursor: pointer;
    }

    .mphdel {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--rb);
      border: 2px solid var(--rbr);
      color: var(--rt);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .addph {
      width: 80px;
      height: 80px;
      border: 2px dashed var(--border2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 24px;
      color: var(--text3);
    }

    .addph:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* bravo */
    .bwrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1.5rem;
      text-align: center;
      background: var(--bg);
      overflow-y: auto;
      gap: 1rem;
    }

    .bemoji {
      font-size: 72px;

    function expRows(rows) { const o = []; (rows || []).forEach(r => { for (let i = 0; i < (r.repeat || 1); i++)o.push(r); }); return o; }
    function expStitches(stitches) {
      const out = [];
      (stitches || []).forEach(s => {
        if (typeof s === 'string' && s.includes('×[')) {
          // ex: 4×[ms,br,ms]
          const m = s.match(/^(\d+)×\[(.+)\]$/);
          if (m) {
            const n = parseInt(m[1]);
            const inner = m[2].split(',').map(x => x.trim());
            for (let i = 0; i < n; i++)inner.forEach(st => out.push(st));
          } else out.push(s);
        } else if (typeof s === 'string' && s.startsWith('[')) {
          // ex: [ms,br,ms] en1
          const m = s.match(/^\[(.+)\]\s*en1$/);
          if (m) {
            const inner = m[1].split(',').map(x => x.trim());
            inner.forEach(st => out.push(st));
          } else out.push(s);
        } else out.push(s);
      });
      return out;
    }

    // Parse un rang en "pastilles" — chaque pastille est {type, stitches[], display}
    function parseStitches(stitches) {
      const out = [];
      (stitches || []).forEach(s => {
        if (typeof s === 'string' && s.includes('×[')) {
          const m = s.match(/^(\d+)×\[(.+)\]$/);
          if (m) {
            const n = parseInt(m[1]);
            const inner = m[2].split(',').map(x => x.trim());
            for (let i = 0; i < n; i++)out.push({ type: 'rep', stitches: inner, display: s, repIdx: i, repTotal: n });
          } else out.push({ type: 'simple', stitches: [s], display: s });
        } else if (typeof s === 'string' && s.match(/^\[.+\]\s*en1$/)) {
          const m = s.match(/^\[(.+)\]\s*en1$/);
          if (m) {
            const inner = m[1].split(',').map(x => x.trim());
            out.push({ type: 'en1', stitches: inner, display: s });
          } else out.push({ type: 'simple', stitches: [s], display: s });
        } else {
          out.push({ type: 'simple', stitches: [s], display: s });
        }
      });
      return out;
    }

    // Compte le total de mailles d'un tableau de pastilles
    function countStitches(pastilles) {
      return pastilles.reduce((a, p) => a + p.stitches.length, 0);
    }

    // Trouve la pastille et sous-index à partir d'un index global de maille
    function findPastille(pastilles, globalIdx) {
      let acc = 0;
      for (let i = 0; i < pastilles.length; i++) {
        const len = pastilles[i].stitches.length;
        if (globalIdx < acc + len) return { pIdx: i, subIdx: globalIdx - acc };
        acc += len;
      }
      return { pIdx: pastilles.length - 1, subIdx: 0 };
    }

      const globalIdx = (p.currentStitch || 0) * 1;
      // on est done quand on a passé toutes les mailles du dernier rang
      const doneGlobal = pastilles.slice(0, p.currentStitch || 0).reduce((a, p) => a + p.stitches.length, 0) + (p.currentSubStitch || 0);
      return (p.currentRow || 0) >= a.length - 1 && doneGlobal >= total;
    }

        for (let si = startSi; si < p.stitches.length; si++) {
          if (p.stitches[si] === cur && p.type === pastille.type) streak++;

      // même logique de couleur que renderPastilles

        col = { bg: 'var(--gb)', border: 'var(--gbr)', text: 'var(--gt)' };

        col = ALTCOLORS[pastille.repIdx % 2];

        let altIdx = 0;
        let lastDisplay = null;
        for (let pi = 0; pi <= pIdx; pi++) {
          const p = pastilles[pi];
          if (p.type === 'simple' && p.display !== lastDisplay) {
            altIdx = (altIdx + 1) % 2;
            lastDisplay = p.display;
          }
        }
        col = ALTCOLORS[altIdx];

      let detail = '';

      return `<div style="background:${col.bg};border:2px solid ${col.border};border-radius:10px;width:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;gap:2px;overflow:hidden;padding:6px;">
    ${pastille.type === 'en1' ? `<div style="font-size:9px;font-weight:700;letter-spacing:1px;color:${col.text};opacity:.8;">${cfg.lang === 'en' ? 'IN 1' : 'EN 1'}</div>` : ''}
    <div style="font-size:22px;font-weight:700;color:${col.text};line-height:1;">${slbl(cur)}</div>
    ${detail ? `<div style="font-size:9px;color:${col.text};opacity:.85;text-align:center;line-height:1.2;padding:0 4px;word-break:break-all;">${detail}</div>` : ''}
  </div>`;
    }

    function nxtSt() {
      const p = curP, a = expRows(p.rows), row = a[p.currentRow || 0]; if (!row) return;
      const ri = p.currentRow || 0;
      const pastilles = parseStitches(row.stitches);
      const pIdx = p.currentStitch || 0;
      const subIdx = p.currentSubStitch || 0;
      const pastille = pastilles[pIdx]; if (!pastille) return;

      // est-ce qu'on est à la dernière maille de la dernière pastille du dernier rang ?
      const isLastRow = ri === a.length - 1;
      const isLastPastille = pIdx === pastilles.length - 1;
      const isLastSub = subIdx === pastille.stitches.length - 1;

      if (isLastRow && isLastPastille && isLastSub) {
        p.currentSubStitch = (pastille.stitches.length); save(); showBravo(); return;
      }

      if (isLastSub) {
        // passe à la pastille suivante
        if (pIdx < pastilles.length - 1) { p.currentStitch = pIdx + 1; p.currentSubStitch = 0; }

        p.currentSubStitch = subIdx + 1;

        const a = expRows(p.rows), row = a[p.currentRow || 0];
        const pastilles = parseStitches(row.stitches);
        p.currentStitch = pIdx - 1;
        p.currentSubStitch = Math.max(0, pastilles[pIdx - 1].stitches.length - 1);

    function nxtRow() {

      if (editRowIdx !== null) { cRows[editRowIdx].stitches = [...cRow]; editRowIdx = null; }
      else { cRows.push({ stitches: [...cRow], repeat: pendingRepeat || 1 }); }
      cRow = []; subMode = null; subRow = []; pendingRepeat = 1; activeRepeatBtns = new Set(); renderCreate();
    }
    function saveProj() {
      if (!nProj.name.trim()) { alert(t('pnm') + ' ?'); return; }
      if (!cRows.length) { alert(cfg.lang === 'en' ? 'Add at least one row!' : 'Ajoutez au moins un rang !'); return; }
      if (!Array.isArray(projects)) projects = [];
      checkEgg(nProj.name);
      if (!editPid && projects.find(p => p.name.toLowerCase() === nProj.name.trim().toLowerCase())) { alert(cfg.lang === 'en' ? 'A project with this name already exists.' : 'Un projet avec ce nom existe déjà.'); return; }
      if (editPid) {
        const idx = projects.findIndex(p => p.id === editPid);
        if (idx > -1) projects[idx] = { ...projects[idx], name: nProj.name, color: nProj.color, notes: nProj.notes, rows: JSON.parse(JSON.stringify(cRows)), folderId: nProj.folderId, photos: nProj.photos || [] };
      } else {
        projects.push({ id: Date.now().toString(), name: nProj.name, color: nProj.color, notes: nProj.notes, rows: JSON.parse(JSON.stringify(cRows)), currentRow: 0, currentStitch: 0, currentSubStitch: 0, folderId: nProj.folderId || null, photos: nProj.photos || [], finishedPhoto: null });
      }
      save();
      cRows = []; cRow = []; editPid = null;
      nProj = { name: '', color: COLORS[0], notes: '', folderId: null, photos: [] };
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      editMode = false;
      renderProjects();
      document.getElementById('projects').classList.add('active');
      updateLabels();
    }

    function leaveCreate() {
      if (cRows.length || cRow.length) {
        showModal(t('leavetit'), t('leavemsg'), () => {
          cRows = []; cRow = []; editPid = null;
          nProj = { name: '', color: COLORS[0], notes: '', folderId: null, photos: [] };
          showScreen('projects');
        }, 'create-project');
      } else {
        cRows = []; cRow = []; editPid = null;
        showScreen(editPid ? 'projects' : 'home');
      }
    }

    // ─── SETTINGS ────────────────────────────────────────────────────────────────
    function renderSettings() {
      document.getElementById('setbody').innerHTML = `
    <div class="ss"><div class="sstitle">${t('theme')}</div>
      <div class="thsel">
        <button class="thbtn dark${cfg.theme === 'dark' ? ' act' : ''}" onclick="setTheme('dark')"><span style="font-size:20px;">🌙</span>${t('dark')}</button>
        <button class="thbtn lght${cfg.theme === 'light' ? ' act' : ''}" onclick="setTheme('light')"><span style="font-size:20px;">☀️</span>${t('light')}</button>
        ${cfg.love ? `<button class="thbtn love${cfg.theme === 'love' ? ' act' : ''}" onclick="setTheme('love')"><span style="font-size:20px;">💖</span>${t('love')}</button>` : ''}
      </div>
    </div>
    <div class="ss"><div class="sstitle">${t('lang')}</div>
      <div class="srow"><div><div class="slbl">Langue</div></div>
        <select class="fsel" style="width:auto;" onchange="setLang(this.value)">
          <option value="fr"${cfg.lang === 'fr' ? ' selected' : ''}>🇫🇷 Français</option>
          <option value="en"${cfg.lang === 'en' ? ' selected' : ''}>🇬🇧 English</option>
        </select>
    </div>
    </div>
    <div class="ss"><div class="sstitle">${cfg.lang === 'fr' ? 'Points · Cliquer pour ajouter en favori' : 'Stitches · Click to add to favourites'}</div><div style="padding:10px 14px;display:flex;flex-direction:column;gap:6px;">
    ${SD.map(s => {
        const code = cfg.lang === 'fr' ? s.fr : s.en;
        const name = cfg.lang === 'fr' ? s.nameFR : s.nameEN;
        const fav = isFav(code);
        return `<div onclick="toggleFav('${code}')" style="display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:8px;border:${fav ? '1px solid #c9a96e' : '1px solid var(--border)'};cursor:pointer;background:var(--bg3);transition:border-color .2s;${fav ? 'box-shadow:0 0 0 1px #c9a96e;' : ''}"><span style="font-size:14px;font-weight:700;color:${fav ? 'var(--gold)' : 'var(--text)'};min-width:36px;">${code}</span>
        <span style="font-size:13px;color:var(--text2);flex:1;">${name}</span>
        ${fav ? `<span style="font-size:11px;color:#c9a96e;">★</span>` : ''}
      </div>`;
      }).join('')}
  </div>
</div>
<div class="ss"><div class="sstitle">${cfg.lang === 'fr' ? 'Options' : 'Options'}</div>
  <div class="srow">
    <div><div class="slbl">${cfg.lang === 'fr' ? 'Vibration au changement de rang' : 'Haptic feedback on row change'}</div>
    <div class="sslbl">${cfg.lang === 'fr' ? 'Appareil compatible requis' : 'Requires compatible device'}</div></div>
    <button onclick="toggleHaptic()" style="background:${cfg.haptic ? 'var(--gbr)' : 'var(--bg3)'};border:2px solid ${cfg.haptic ? 'var(--gbr)' : 'var(--border2)'};color:${cfg.haptic ? 'var(--gt)' : 'var(--text3)'};padding:6px 16px;border-radius:20px;font-family:Georgia,serif;font-size:13px;font-weight:700;cursor:pointer;">
      ${cfg.haptic ? (cfg.lang === 'fr' ? 'ON' : 'ON') : (cfg.lang === 'fr' ? 'OFF' : 'OFF')}
    </button>
  </div>
</div>
    <div class="ss"><div class="sstitle">${t('data')}</div>
      <div class="srow"><div><div class="slbl">${t('delall')}</div></div><button class="rab red" style="padding:8px 14px;" onclick="resetAll()">${t('delall')}</button></div>
    </div>
    <div style="text-align:center;padding:2rem;font-size:11px;color:var(--text3);">${t('ver')}</div>`;
    }
    function setTheme(v) { cfg.theme = v; save(); applyTheme(); updateLabels(); renderSettings(); }
    function setLang(v) { cfg.lang = v; save(); updateLabels(); renderSettings(); }
    function setDisp(v) { cfg.disp = v; save(); renderSettings(); }
    function resetAll() {
      showModal(t('delall'), t('delalc'), () => {
        projects = []; folders = []; cfg = { lang: 'fr', theme: 'light', disp: 'code', love: false, favSt: [] }; save(); applyTheme(); showScreen('home');
      }, 'settings');
    }

    // ─── INIT ─────────────────────────────────────────────────────────────────────
    updateLabels();
  </script>
</body>

</html>
